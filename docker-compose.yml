version: '3.8'

services:
  generator:
    build: .
    command: python generator/log_generator.py
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_FILE_PATH=/app/logs/server.log
      - LOG_INTERVAL_SECONDS=2
    restart: unless-stopped

  analyzer:
    build: .
    command: python analyzer/monitor.py
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - LOG_FILE_PATH=/app/logs/server.log
      - ALERT_SEVERITY_LEVEL=ERROR
      - THROTTLE_WINDOW_SECONDS=60
    restart: unless-stopped
    depends_on:
      - generator
